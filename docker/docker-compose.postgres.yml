version: '3.8'
services:
  db:
    image: postgres:15
    container_name: taskforge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
      POSTGRES_DB: taskforge
    volumes:
      - db_data:/var/lib/postgresql/data
      - ../database/migrations:/migrations:ro
    ports:
      - "5433:5432"

volumes:
  db_data:
